version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - pulse_redis_data:/data

volumes:
  pulse_pg_data:
  pulse_redis_data:
